apiVersion: v1
kind: Secret
metadata:
  name: todo-secrets
type: Opaque
stringData:
  JWT_SECRET: "your_jwt_secret_here"
  MONGODB_URI: "mongodb://mongodb-service:27017/todolist"
  # Add other secrets here, base64 encoded if using data field, 
  # but stringData handles encoding for you.
  # GOOGLE_CLIENT_ID: "..."
  # GOOGLE_CLIENT_SECRET: "..."
  # RAZORPAY_KEY_ID: "..."
  # RAZORPAY_KEY_SECRET: "..."
